name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag，例如 v1.0.0"
        required: true
      version:
        description: "展示在 App 中的版本号，例如 1.0.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            asset_suffix: macos-x64
          - runner: macos-14
            asset_suffix: macos-arm64

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          VERSION="${RELEASE_VERSION#v}"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test

      - name: Build release app
        env:
          APP_VERSION: ${{ steps.version.outputs.value }}
          BUILD_VERSION: ${{ github.run_number }}
        run: ./scripts/build_release_app.sh "${{ matrix.asset_suffix }}"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          path: |
            dist/*.zip
            dist/*.sha256

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --generate-notes --title "$RELEASE_TAG" --target "$GITHUB_SHA"
          fi
